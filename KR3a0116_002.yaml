body:
  text: 三魚堂賸言卷二監察御史贈內閣學士陸隴其撰看左傳疏孔頴達序謂賈逵服虔之徒雜取公羊榖梁以釋左氏方鑿員枘杜元凱左氏集解專取丘明之傳以釋孔氏之經所謂以膠投漆愚因思今日講程朱之學而雜取象山陽明之説是猶賈服之訓左傳也又杜序疏云史非一人辭無定式故日月參差不可齊等及仲尼修改因魯史成文舊有日者因而詳之舊無日者因而略之既自有詳略不可以為褒貶故春秋諸事皆不以日月為例其以日月為義例者惟卿卒日食二事而已故隱元年冬十有二月公子益師卒傳曰公不與小斂故不書日桓十七年冬十月朔日有食之傳曰不書日官失之也二條以外皆無義例公羊榖梁之書或日或月妄生褒貶先儒溺于二傳橫為左氏造日月褒貶之例又曰春秋無日無月者十有四月無時者二或史文先闕而仲尼不改或仲尼備文而後人脫誤此皆説得最是周禮有太史小史內史外史孔疏謂諸侯無內外史然劉炫引康誥太史友內史友似諸侯有內史矣則曰遍舉記傳諸侯無內史之文又季孫召外史掌惡臣言外史似有內史矣則曰外史猶史居在南謂之南史耳南史當是小史南史外史非官名也又左史右史亦非史官之名也皆能自伸其説藝文志云左史記言右史記事玉藻云動則左史書之言則右史書之二文不同孔疏以隂陽動靜之理推之而主玉藻又云周禮諸史雖皆掌書仍不知所記春秋定是何史又疏云春秋之文詳略不等螟螽蜚蜮皆害物之蟲蜚蜮言有螟螽不言有諸侯反國或言自某歸或言歸自某晉伐鮮虞吳入郢直舉國名不言將帥及郊與用郊皆無所發諸侯出奔或名或不名是其史舊有詳略義例不存於此故不必皆改也此亦去了許多葛藤杜序謂發傳之體有三疏云是發凡正例新意變例歸趣非例三者所云發凡正例者傳稱凡者五十先儒多云丘明以意作傳無新舊之例惟杜則發發凡言例是周公垂法史書舊章所云變意新例者經文顯者傳本其纎微經文幽者傳闡使明著有自發大義者有史所不書即以為義者皆是新意所謂歸趣非例者經無義例不著善惡故傳直言其指歸趣向而已非褒貶之例也此三者括盡春秋之大綱又杜序云為例之情有五疏云五曰懲惡而勸善者與上微而顯不異但勸戒緩者在微而顯之條貶責切者在懲惡勸善之例先儒發例如此者甚多朱子於戒慎恐懼中提出慎獨即此意也杜氏駁去素王素臣黜周王魯之説最有功於春秋春王正月之説當折𠂻於程朱是周正非夏正吳志伊春王正月辨三篇大意謂春秋自主周正若周禮則以夏正雜周正詩歌所詠則如今人稱攝提孟陬等語不泥昭代時令安得以周禮豳風而并疑左傳春秋諸書乎又謂商周改時月秦改歲始不改時月亦不得強合而一之以致彼此交疑其言商亦改時月者則據梓慎云于夏為三月于商為四月于周為五月漢律厯志云夏為十月商為十一月陳寵云陽氣始萌天以為正周以為春陽氣上通地以為正殷以為春陽氣已至人以為正夏以為春有此數據則殷之改時改月可知書之言惟元祀十有二月者今子月耳即位宜於歲首而不於歲首未踰年不應改元而改元則夏忠商質亦難以周禮證夏商也若夫秦則改年始而不改時月以閏月為後九月史記確有所據而文頴顔師古輩泥商周改月之見更謂秦以十月為正月若史家所載皆太初時追改非當時本稱則又拘矣其論甚辨然吾謂梓慎陳寵之言或以夏周之時月而遙推商之時月亦未可知難定謂改時改月商周則同踰年改元商周則異總之古事難以臆斷也孔疏論鄭伯克段只譏其失教而以處心積慮之説為非最是覺伯恭博議未免過當閲杜注弔生不及哀疏中詳言其既葬除喪之意此杜注之最差處隱三年日食條下引襄草二年九月十月皆日食草四年七月八月皆日食注疏皆不能言其故此誠不可解注疏曲沃即聞喜也而今則曲沃聞喜為二縣翼即絳也而今則翼城絳州為一州一縣又按疏唐叔始封在太原晉陽縣則今之太原府也成侯徙曲沃穆侯徙絳則今之絳州其後又遷新田則今之絳縣皆在平陽府蓋益遷而西南去始封之都甚逺孔疏論董狐書法不隱孔子稱為良史而春秋魯君見弒左氏以為諱國惡禮也見仁非一塗此論亦最是僖元年諱國惡下孔疏説得此意尤精閲孔疏論桓不書王榖梁以為桓無王故不書王杜氏以為王不頒歷故不書王劉炫以為闕文三説未敢定為孰是但劉據襄二十七年哀十二年傳稱司厯過也杜氏釋例皆指為魯司厯似厯非王朝所班且子朝之亂王位且未定何能班厯而亦書王駁得甚是孔氏則又以為厯或諸侯所為亦遙稟天子正朔子朝之亂經仍稱王不責人所不得也猶如大夫之卒公疾在外雖不與小斂亦同書日之限辨得亦最好桓三年日食孔疏論所以食之故未甚明查通考交食之法自隋以前猶未詳著大抵朔望值交不問內外入限便食惟隋張胄元獨得其妙以為日行黃道月行月道交絡黃道外十三日有竒而入經黃道謂之交若月行內道在黃道之北則食多有驗月行外道在黃道之南雖遇正交無由掩映食多不驗孔氏去隋尚近看來猶未通此法其云食有上下者行有髙下謂月在日南從南入食南下北髙則食起于下月在日北從北入食則食發於髙此恐亦未確昭七年疏云每一百七十三日有餘則日月之道一交交則日月必食可見孔氏尚未知張胄元之法有年大有年之書先儒云桓宣不宜有而有杜孔皆不主此説頗覺平正左傳春搜夏苖秋獮冬狩此是以夏時言觀桓四年春公狩于郎經傳可見杜注亦云田狩從夏時桓五年州公如曹疏引鄭玄云殷地三等百里七十里五十里武王克殷雖制五等之爵而因殷三等之地及周公制禮大國五百里小國百里所因殷之諸侯亦以功黜陟之是以周世有爵尊而國小爵卑而國大者爵尊國小蓋指州公虞公也此一假大抵欲調停王制周禮之異同也然尚説得未明因其言推之蓋百里七十里五十里者初封之制也五百至百里者黜陟之制也公侯之地百里有功則可加至五百里四百里伯七十里有功則可加至三百里子男五十里有功則可加至二百一百里若如州虞之屬未嘗加者仍其始封之地而已閲孔疏論啓蟄而郊明堂位言周之正月郊者蓋春秋之末魯稍僭侈見天子冬至祭天便以正月祀帝記者不察其本遂謂正月為常又鄭玄注書多用讖緯言天神有六地祇有二天有天皇大帝又有五方之帝地有崑崙之山神又有神州之神大司樂冬至祭于圜丘者祭天皇上帝月令四時迎氣於四郊者祭五德之帝蒼帝其名曰靈威仰赤帝曰赤熛怒黃帝曰含樞紐白帝曰白招拒黑帝曰叶光紀魯無冬至之祭惟祭靈威仰焉惟鄭玄立此為義而先儒悉不然故王肅言天體惟一安得六天也晉武帝王肅之外孫也泰始之初定南北郊祭一地一天用王肅之義杜君身處晉朝共遵王説集解釋例都不言有二天然則杜意天子冬至所祭魯人啓蟄而郊猶是一天但異時祭耳此注直云祀天南郊不言靈威仰明與鄭異也觀此可見注一書必知此書之來歷查一統志雲夢澤在德安之安陸縣南五十里又云在荆門州北連德安府雲夢界考此二處去江尚逺不知何以古云跨江南北查德安亦古江夏地故注云在江夏安陸枝江華容以地勢言之則雲夢又在洞庭之西閲左傳鄧曼論楚子一段有感於持盈之道向讀所謂余心蕩者未知如何謂之蕩杜注謂蕩動散也動散二字與主一無適正相反臨事而思慮散亂不能專一是之謂蕩非必荒淫放佚然後為蕩也然以為盈而蕩者則又何故夫思慮𣪚亂之人必隱然有一段自滿之意若以目前之事為不難而旁思橫想浸淫至于不可收拾非精神耗𣪚而喪身則謀為顛倒而僨事然則鄧曼何不於王前一言提醒使之收拾其心以幹大事而惟退而竊歎也曰鄧曼亦必言之而史不及詳然亦知雖言之而非一時所能收拾甚矣盈之為害也蓋楚子之心蕩亦猶莫敖之舉趾髙也然莫敖之病浮可以威救之楚子之病深非一時針警所能愈惜乎鄧曼不能見之於早至于此而後知之也莊二十五年日食孔疏云古之厯書亡矣漢興以來草創其術三統以為五月二十三分月之二十而日月交會近世為厯者皆以為一百七十二日有餘而日一食觀此條益知孔疏猶未逹隋張胄元交食之法莊二十六年晉士蒍為大司空孔疏云晉自文公以後世為盟主征伐諸國卿以軍將為名司空非復卿官故文二年司空士縠非卿也雖則非卿職掌不異成十八年傳曰右行辛為司空使修士蒍之法是其典事同也觀此知當時官制變革名同實異成二年晉司馬司空皆受一命之服疏云司馬司空本是卿官之名但晉之諸卿皆以三軍將佐為號其司馬司空皆為大夫之官孔疏以筮短龜長為卜人假託之詞而非正理最是又云臭是氣之總名原非善惡之稱但既謂善氣為香故專以惡氣為臭説臭字亦最明僖九年甲子晉侯佹諸卒孔疏云春秋之世史失其守赴告之文多違禮制計諸侯之薨當以其薨之月日告于鄰國隱三年傳曰壬戌平王崩赴以庚戌故書之是赴者妄稱日也襄二十八年傳曰王人來告喪問崩日以甲子告故書之是元赴不以日被問乃稱日也文十四年傳曰七月乙卯夜齊商人弒舍齊人定懿公使來告難故書以九月是赴者不言死月魯史不復審問即書以來告之月也此甲子晉侯卒蓋赴以日而不以月魯史不復審問書其來告之日惟稱甲子而已不知甲子是何月之日故戊辰後也按此外如晉惠公卒于僖二十三年九月而經書于二十四年之冬孔疏皆云是因赴告而然顧寧人乃據僖五年殺太子申生九年弒卓子十年殺丕鄭十五年戰韓原經傳日月錯互謂是晉用夏正恐不其然雖有竹書紀年之證然竹書恐是偽作味韓簡對晉惠之言見蓍龜能知吉凶不能變吉凶味內史叔興論宋襄之言知災異由隂陽而見不由隂陽而生皆卓然明理之言叔興之言服虔劉炫所解勝於杜氏杜氏將隂陽吉凶各作一項説而以洪範之咎徴及傳所云亂則妖災生皆歸之神道設教而非實辭恐涉於王介甫天變不足畏之説孔疏兩載其義而不敢斷蓋亦知杜氏此説有病也子玉不肯以瓊辨玉纓祀河子産不肯以瓘斚禳火事相類而不同者子産是恐以鬼神而廢人事子玉是不知借鬼神以安人心孔疏説得甚明左傳襄王出居于汜杜注云是南泛在襄城縣南秦軍泛南杜云是東泛在滎陽中牟縣南皆屬鄭地皆音凡然今鄭州汜水縣土人又讀作巳不知何故查正韻泛音凡在覃韻汜音巳在紙韻二字不同據襄草六年疏在中牟襄城者是地名在成臯者是水名成四年晉伐鄭取泛祭孔疏云杜注中牟縣有東泛襄城縣有西泛知此泛祭非彼二泛而以成臯縣東有汜水者以晉人所取當是鄭之西北界即今汜水也字書水旁巳為汜水旁已為泛不相亂也查韻會舉要成臯之汜水音似從巳襄城之泛水音凡從卩漢髙即位之泛亦從卩而音泛曹咎自剄之汜水則即成臯之汜水也又衛懿公與狄戰滎澤杜注云在河北而一統志即指為鄭州之滎澤縣則在河南矣僖三十年魯饗周公閲有白黑形鹽注云白熬稻黑熬黍疏云榖之白黑惟稻黍為然豫猶憶李子正云北方之細米即稷髙粱即黍也又有一種叫黃米者似細米而稍大以孔疏之言證之誠然但以律管纍黍之義考之則髙粱恐未必是圓當再考寧武子不肯祀相而子産勸晉祀鯀孔氏疏亦未甚明三魚堂賸言卷二
