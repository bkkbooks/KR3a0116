body:
  text: 三魚堂賸言卷十二監察御史贈內閣學士陸隴其撰性理朱子論讀書法曰書只貴讀縱熟看過心裡思量過也不如讀讀來讀去少間曉不得底自然曉得已曉得者越有滋味某舊苦記文字不得後來只是讀今之記得者皆讀之功也又曰讀書之法循序而漸進熟讀而精思愚閲此不覺爽然向來正病在思之功多而讀之功少所以學問不能長進何可不自勵張瑶山論做詩云後生才得科第去學做詩做詩何用好是李杜撇下許多好人不學却去學醉漢此等議論大有益學者張江陵作呂豫所諱調陽墓志云公為人外溫而心辨中毅而貌和於事呐呐不輕為可否於人恂恂不茍為異同嘗曰大臣協心體國茍利社稷嫌怨共之政本之地齗齗而爭如國體何世儒嘐嘐猥小曹參而卑丙吉然則虞廷云寅恭者非耶按江陵之贊呂公者如此而其身則殊不然蓋呂公之為人亦非中正之道也讀其辛未程䇿論治不主更張而主綜核綜核二字是江陵本領乃惡更張而遂病孟子之法先王而取荀卿之法後王則過矣閲威咫叔所作韻法至論縱有四聲橫有七音之説似是而實非謂在樂五聲二變為七音若喉舌唇齒之音即止於七亦與樂之七音風馬牛不相及也夫十二律者聲之有定者也宮商者聲之無定者也今以一字而髙下之則十二律殆幾乎遍律尚不可定而可定其為宮商乎且玊篇韻會及陳獻可其分屬互有不同其為牽合無疑此論實聞所未聞又相與面論三十六字母宜刪者六宜增者二十有八合之得五十八母切韻指南等書不知聲之有母非三十六字之可統也故有音和類隔等門展轉葛藤又云邵子不用見溪羣疑等母而以他音一百五十二為母此是振古人豪之識但聲音之數則實無如是之多也若獻可之韻雖云本邵子實不用邵子之法又云從來韻譜止為詩賦限韻而設原非審音而分韻元尚聲律而周氏之韻出一釐千古之訛洪武因之又云自唐以前之詩必以律呂調之而始可合樂至詞曲起則律呂即在詞曲之中矣辛酉十一月閲邵子書知以律呂配聲音亦是借説非樂中之律呂真西山集有葉安仁墓志銘云葉名湜字子是建安人為安仁令以循吏稱子采末云世逺道散為政者芻狗其人鬼魅其俗以為非嚴法峻刑不能服而朝夕所治者敲朴以聚財而已其聞義利先後之説鮮不姍笑以為迂濶而君用之於治邑不期年間其效章灼若是然則古道不可行於今斯民不可以理義化其又果然與又言君壯嵗遊文公朱先生之門得以直養氣之説故其為人磊落明白無所回隱愚向讀葉采近思録注不知其人觀此知采之學有自來矣西山集史彌逺乞歸田里補還服制不允詔曰大臣之義與衆庶不同多事之時視承平亦異夫既任安危之責則當權輕重之宜其他賜彌逺詔尚多皆極其贊揚至云羣材彚進蔚有慶厯元祐之風公道砥平浸還乾道淳熙之舊西山亦不幸而處此時哉嗣開叔祖言法不可輕變所變之法雖善而小民未必通知則胥吏反因以生姦非數年之久不能得其益又言人之姦弊當預防之不可使至于甚至於甚而後治之則所傷實多宋崑友言我輩當隨處體認天理亦當隨處培養人材閲崑友謁劉青田祠詩跋云向聞先生埋金以遺子孫凡有發掘處相傳以為美談余心疑之誠如所云則管華之不若矣何以為先生及至括蒼寓城東張賔朋家備問青田軼事如埋金發掘俱正統時巨寇鄭諌胡陶得二子孫所為假先生以欺世爾愚按此為青田表白不可不知臨川四先生止艾東鄉天傭子集中有有用之文泊小貞借宿於蘆花菴菴臨泖濵僧心遺指菴前之泖云此為橫泖其自泖塔一直上南者為長泖二泖相並其又南則為圓泖蓋即五舍泖也泖字在篇海字彚皆音栁其字始見于陸機對晉武帝之言愚因僧言思所謂三泖者乃陸機一時之言以其傍九峰言之耳若夫五舍泖之南有小泖以及泖橋以南之泖皆不在三泖之數也又泖塔僧漢輪云青浦北捍山有橫泖為三泖之一在泖塔東北泖橋以南者為長泖此説近之途中看車箱兩旁下又釘一小橫木中間鑿為半月形含軸其中亦有於小橫木下為兩足以含軸者此即考工記注所謂伏兔也又疑車箱四旁木皆謂之軫如今蘆席四旁有邉者亦謂之軫當再考呂涇野送黃廣東序云今之聼獄也速判結以為神空囹圄以為靜遏告訴以為威習左右以為察委屬吏以為體納請謁以為通久淹禁以為慎法是以不中而民是以罔措此數語可為炯戒涇野浩齋詩敘云自孟子後漢時董汲陳郭諸賢似能行而未盡明隋唐時王韓陸李諸賢似能明而未必行趙宋周張二程馬邵諸賢似能明且行矣而未至此數語説得好又送汪希周序云凡官省下者率知獲上而不知治下知勤簿書而不知勤農桑知信吏胥而不信閭閻知奔走司院而不知行阡陌官是以日遷而民是以日敝此數語形容俗吏最精涇野又有云學士君子者將以治國平天下者也當其未仕之先所宜急者莫有過於身家身家理而國天下不難矣然而學士君子往往舍其本源巧藝以謀進多術以干顯後雖有國天下之責莫從而理也此一段最中學者之病驗祭品中有黍稷稻粱粳五種粱係髙粱稻乃南方之粳米粳乃南方之糯米黍稷同一種但黍黏而稷不黏獨不用小米吏云前任丁去之想必因祀典上止有黍稷稻粱然豫疑今北方所謂小米乃是稷所謂稷乃是黍之不黏者耳故府志云土人謂飯黍為稷存之以俟知者其以糯米為粳此必是吏之偶誤馬夫以穀數種來看其所謂榖子者有紅黑白三種黑者粘其所謂黍子者有紅白二種皆粘而指庭中所産似黍者則謂之稷子又有一種其穗似狗尾草者則謂之粱穀其種最貴蓋是粟之别種行鄉飲酒禮舉觶在賔主獻酢之後今在前恐未是又思今之用湯即古太羮之意用茶即古元酒之意湯潛菴黜淫祠疏當與會典祭厲文同看一是不侮鰥寡一是不畏強禦君子之待幽明一個理羣芳譜係新城王象晉所輯亦不為無用然考草木而不甚引爾雅及漢唐注疏覺少源委如指飯黍為稷及將鄭風之荼與弼風之荼看作一物皆是踈處閲呻吟語問治人之道曰無忿疾於頑竊思頑是最可忿疾者千態萬狀他反要來愚我謗我我涵飬稍不足忿疾便生一友作生日詩云鐵漢有身經百鍊金人無口學三緘二語最好然未易言不善鍊者只鍊得世情不曾鍊得道義不善緘者只緘得當言的不曾緘得不當言的看夜行燭思此書篇名多淺俗蓋必月川先生因其父之所問以名篇可見納約自牖之意而月川先生一團誠意如春氣之隨處充滿有隙便入亦可想見小學是古方夜行燭是因病加減之方戰國䇿一書只應列在諸子算不得史朱子諸封事人但見其一味正直然其中仍有一段忠厚和平之意在所以後來雖危而不至於嬰禍閲潛確類書見其載滹沱河滋河絶無源委真是無頭學問又太史公律書言卯之為言茂也此書乃引之以證三泖之泖尤誤按泖字疑本作卯因在正東而言晉人疑此為東江非無謂也後人於卯旁加水耳蓋三江婁淞皆在東北惟此在正東本草載陶𢎞景云佛書稱乳成酪酪成酥酥成醍醐可以悟學問已精益精之境陳端伯言劉誠意未嘗講風水皆世俗附會唐夢賚言青城童子八歲能知未來事未幾童子病病愈不復能有所知一鈍人耳邵子昆言有人生而能言其前生事余因憶樗林隨筆中有一條言人生而能知其前生後不復記憶者是有物憑焉此最足破愚俗范浚蘭溪人即作心針者今有香溪集尚存向疑通鑑纂本載潘氏總論不知其為何人今見婺源志文苑內有之字伯誠但鑑上多稱陽節潘氏志則稱節齋錢塞菴名士升少受業於顧涇陽嘗手輯涇陽十書其居喪最盡禮以家禮所載與朱子平昔議論多異同作家禮考證一編二書惜未得見偶閲大學衍義補厯象法二卷見丘瓊山取詩十月之交注而不取堯典天與日月皆左旋之注蓋瓊山亦未知二説之一也三魚堂賸言卷十二
