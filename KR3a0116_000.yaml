body:
  text: 三魚堂賸言目録儒家類卷一計二十條卷二計三十九條卷三計三十二條卷四計二十七條卷五計四十五條卷六計四十二條卷七計二十六條卷八計三十二條卷九計三十七條卷十計一十六條卷十一計二十條卷十二計三十三條臣等謹案三魚堂賸言十二卷國朝陸隴其撰本名日抄皆平時劄記之文未分門目其甥金山陳濟排次成編雖亦不立標題而推求其例則一卷至四卷皆説五經五卷六卷皆説四書而附太極圖説近思録小學數條七卷八卷皆説諸儒得失九卷至十二卷皆説子史而亦間論雜事昔朱子博極羣書於古今之事一一窮究其原委而别白其是非故凡所考論悉有根據不為懸揣臆斷之談隴其傳朱子之學為國朝醇儒第一是書乃其緒餘而於名物訓詁典章度數一一精核乃如此凡漢注唐疏為講學諸家所不道者亦皆研思探索多所取裁可知一代通儒其持論具有本末必不空言誠敬屏棄詩書自謂得聖賢之心法其于朱陸異同非不委曲詳明剖析疑似而詞氣和平使人自領亦未嘗堅分壁壘以詬厲相爭蓋諸儒所得者淺故爭其名而不足隴其所得者深故務其實而有餘觀於是編可以見其造詣矣乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d50c1d1a0b4d095978c8e996409dcf40081d883bef4936315a1c113b70612d89
