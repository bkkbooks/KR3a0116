body:
  text: 三魚堂賸言卷九監察御史贈内閣學士陸隴其撰初學讀戰國䇿不如將綱目自威烈王至秦始皇并天下熟讀綱目序知伯之事於威烈王二十三年序子思之言于顯王二十三年皆是追叙法知伯子思皆綱目前人綱目書法於孝恵四年帝冠條下云於是帝生十五年矣查荀悦漢紀髙祖崩年孝恵已年十六安得如書法所云又綱目髙祖十年分注内東園公綺里季夏黄公甪里先生正誤因杜詩黄綺終辭漢之句遂云綺里季夏一人也黄公一人也今查漢紀四人曰東園公夏黄公甪里先生綺里季安得如正誤之言又查孝恵四年立皇后張氏漢紀綱目俱云是魯元公主女然恐非魯元所親生觀髙帝七年上欲以魯元許匃奴此時尚未歸張敖也安得至孝恵四年遂有如此長女荀悦議其非禮恐亦未考漢武綱目跅弛二字跅是跅落乃不顧利害之意弛是弛廢乃不循規矩之意注不甚明綱目雖極與嚴光然不載足加帝腹之事蓋不予其傲也閲桓帝延熹三年綱目趙岐為皮氏長以宦者左悺兄為河東太守恥之即日棄官而歸可謂危行矣惜未能言孫以至家屬受禍此李固之女文姬所以戒其弟也玩綱目言孔北海才踈意廣只是大綱好細目未盡㸔國語三川震篇因思後世地震之變多矣不必皆亡伯陽父何以知幽王之亡大抵天變與人事相叅人事不爽天變偶至不至於亡如元氣壯盛之人偶感風寒也人事既壊天變又至其亡必矣如元氣衰弱之人復遭風寒也觀其言周徳若二代之季可知國語管子對桓公曰設象以為民紀式權以相應比綴以度竱本肇未設象者立為一定之法也式權者用其變通之宜所以善此法也比綴以度以人之衆寡言人有衆寡難以一法治比校之連綴之宜分則分宜合則合各有度焉竱本肇末以事之本末言事有本末難以一法理等量之匡正之宜重而重宜輕而輕亦各有度焉是皆所謂權也國語夙沙釐云吾委質于翟之鼓非委質于晉之鼓也韋昭註云質贄也左傳狐突云䇿名委質杜註孔䟽云質身體也二説不同説異而不妨並存者此類是史記趙世家獻侯即位治中牟瓉注中牟應在相州非鄭中牟辨地里志之失最是項羽紀宋義留安陽索隠謂應在宋州非相州之安陽辨師古之非最是公孫𢎞儘有好處如誅郭解抑卜式殺主父偃皆不可謂不是特阻汲黯董仲舒則不能為之解史記公孫𢎞傳不載其開東閤事亦是太史公惡而不知其羙處閲汲鄭傳鄭俠而和汲俠而清讀李斯傳以督責為王道以申商為聖人何異指鹿為馬史記相如傳序上林八川而云東注太湖何謬至此註不能正而反附㑹之何也郭解之謙讓只是一個克字與萬石君之氣味全别讀貨殖傳太史公只知人心不知道心只知氣質之性不知義理之性漢書武帝紀不載輪臺之悔可謂不知要閱漢書鼂錯傳峭直刻深四字直與深本是美字峭刻便成病痛蕭望之不悦丙吉而非耿夀昌常平議君子與君子不能盡合從古有之漢書儒林傳叙易獨詳而於毛詩及春秋三傳甚略毛公及公羊榖梁子皆不載其名及其授受尚書自伏生以上亦絶不知其授受不知其何故漢書循吏儒林二傳學者不可不讀荀恱三游論可與班史游俠論同讀游字不知當作何解疑是浮也查綱目班荀二論俱採附於誅郭解之下光武紀王莽和戎卒正邳肜及考肜傳則作和成未詳孰是閲黄子鴻所訂晉地里志於青州濟南郡有三疑云按二漢志及宋魏諸志濟南所領如歴城朝陽著土鼓於陵等縣皆同未嘗云有所移徙省廢今此志所領皆北海之縣而本郡故縣槩無一見可疑一也又按漢志有北海郡景帝置後漢不改魏晉紀中皆有北海王宋魏皆有北海郡今本志濟南所領五縣前後志皆属北海未嘗云有更置獨此志縣存而郡改可疑二也又按本志晉凡郡國一百七十三今止一百七十二計失一郡疑即北海也但通典不詳通考亦仍之蓋其沿誤久矣今當於濟南郡下改正曰領平陵厯城朝陽著土鼓於陵等縣另増北海郡漢置統縣五始列平夀下密膠東即墨祝阿五縣于其下其考証甚詳然愚取左傳杜註查之其言濟南當有厯城平陵朝陽及平夀即墨當屬北海見於桓十八年莊十年襄四年六年二十七年之註信矣但昭二十五年齊侯唁公于野井註云濟南祝阿縣東有野井亭則祝阿在晉固屬濟南也又莊元年齊師遷紀郱鄑郚註云北海都昌縣西有霅城則北海又有都昌也此則又可疑查子鴻草木原云本志濟南所屬五縣其四縣皆舊屬北海子鴻言晉書地里志張氏所置涼州十一郡乃落去西海郡查魏書張軌傳始得之胡三省通鑑注亦以為亡一郡蓋刻板之訛久矣胡却不知查魏書耳又沙州内落髙昌一郡戊巳校尉戊巳二字訛作張茂以三字亦查魏書挍正葉石君言晉書李特載記中􅠅字音觸諸本多訛作二字隋劉炫與牛𢎞論令史之言讀周禮者不可不知此與李諤之論文體王通之答楊素皆隋代之至言黄俞邵言元史之踈畧甚有一人而前後重出者如藝文志則竟不作當時纂修者皆名儒而踈畧如此豈非政令嚴刻諸儒迫於期限遂不及詳慎與元史不作藝文志恐其陋不在史而在元元史祭祀志言漢承秦敝郊廟之制置周禮不用謀議巡守封禪而方士祠官之説興兄弟相繼共為一代而統緒亂迨其季世乃合南北二郊為一雖以唐宋盛時皆莫之正按此則古者兄弟相繼各為一代當考㸔元史不忽木傳歎許魯齋成就人材之功不可及也次焉者王鶚之于闊闊蕭㪺之于孛术魯翀乎傳掌雷明書筆力頗弱以張孚敬等置佞倖傳張居正置權臣傳李贄置異教傳其識甚卓明書張居正贊云居正祖申韓之餘習結曹王之奥援器滿而驕沒身之後名臭家滅明之相本實撥於此萬死莫贖此論甚卓又佞倖傳云桂萼之為吏部尤私其所厚善而修睚眦怨獨以名薦魏校為國子祭酒属使代䟽草其條對經學時政徃徃精深當上意而校與新建伯王守仁争名不相下萼為之搆守仁奪世封而校入侍經筵忤㫖改補太常萼不能救此一段説得莊渠甚無色明書以張玉入亂賊傳而謂髙拱夏言皆不學無術妙極明之賦役有夏稅秋糧即唐之租有均徭即唐之庸有里甲即唐之調其夏稅秋糧之名雖似本楊炎却與楊炎不同楊炎之法是并均徭里甲總入夏稅秋糧之内三魚堂賸言卷九
