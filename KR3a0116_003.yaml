body:
  text: 三魚堂賸言卷三監察御史贈內閣學士陸隴其撰閲左傳文元年閏三月哀二十七年十一月辰在申昭二十年二月日南至哀十二年十二月螽知春秋時閏法差錯最多所以杜預作長厯止就春秋日月考其節候最為有見孔疏論之亦最詳後世乃欲以春秋驗厯法或欲以厯法證春秋皆見笑於杜氏者矣文二年孔疏云鄭𤣥以明堂在國之陽與祖廟别處左氏舊說及賈逵盧植蔡雍服䖍等皆以祖廟與明堂為一故杜同之孔之尊杜最至寧嬴論剛克柔克俱在修已上說與書解不同而自不相背晉大夫莫賢於士㑹父子而范氏不能如韓魏之盛考杜注士㑹係士蒍之孫宜其後之不昌矣然猶有數世之久則士㑹父子挽回造化之力也是猶宣德𢎞治之繼永樂與文六年閏月不告朔孔疏云必于月朔為此告朔聽朔之禮者人君逺細事以全委任之責而又恐移聽于左右故因月朔㑹羣吏而聼大政非徒議將然也乃所以考已然又惡其密聼之亂公也故顯衆以斷之玩此一段可以識政體閲左傳文公四不視朔夫不視止於四則視朔之時多矣不知告朔之禮自何年始永廢並不見經傳而論語注云魯文始不視朔蓋其端自此開也葛藟猶能庇其本根疏云比之隱者謂之興興之顯者謂之比說比興甚好孔疏疑鄋瞞之種類太竒又疑其處者為劉氏一句似漢儒之附㑹疑得亦是成二年孔疏大路二字莗木是卿大夫車之尊者鄭子蟜叔孫穆子受之于王皆稱大是也金路是諸侯車之尊者亦稱大定四年大路大旗是也玉路天子車之尊者亦稱大顧命大路在賓階面是也又成六年辨內朝外朝凡人君內朝二外朝一內朝二者路門內外之朝也外朝一者庫門外之朝也若諸侯三門臯應路外朝則在應門外魯之三門庫雉路則外朝在雉門外如此之類不看注疏如何得明夫子論治必先富之然韓獻子曰國饒則民驕佚敬姜曰沃土之民不材蓋聖人原重本富不重末富欒武子善鈞從衆一言與子犯師直為壯之說同稱妙絶逢滑論禍福楚子囊言君命以共亦是這箇派頭孔疏許今潁川許昌是也漢世名許縣耳魏武改曰許昌靈公遷葉悼公遷夷一名城父又居析一名白羽許男斯遷容城按一統志許昌即開封府許州葉即南陽府裕州葉縣城父在汝州白羽即鄧州內鄉縣皆是楚地蓋許自葉而夷而析雖名為國其實是楚之縣矣戰國之滕若欲遷時亦是如此想太王之遷亦必奉命於殷亦是此局面成七年申公巫臣以兩之一卒適吳舍偏兩之一焉疏云惟言留一偏不見原將車數不知去時幾乘車去也丘明為傳辭皆易解此獨蹇澀或誤玩之可見文無起伏照應便屬蹇澀讀季文子對韓穿之言至信以行義一句因思當時最重在信然所謂信只是克踐其言世儘有言之克踐而心實虛浮者所以聖人言信必緊連忠字此是王伯之辨然聖門所以必言忠信者又不是只怕人信而不忠蓋亦怕人忠而不信世有一等人心實無私而力量未足外反為遺漏此又是學問踈密之辨學者所當致力雖忠而不信也叫不得忠然分看却是二件孔疏襄九年辨分野云天有十二次地有九州當彼十二次周禮雖云皆有分星不知其分誰分之也星紀在于東北吳越實在東南魯衛東方諸侯遙屬戌亥之次徒以相傳為說其源不可得而聞之蓋古之聖人有以度知非後人所能測也按孔氏不作斷語最是愚意此必由厯代星官占驗而得之如某宿有變其驗恆在某國遂定以為此國之分星蓋非一人一代所能定也其理亦本不可解所謂星之與土以精氣相屬而不係乎方隅庶幾得之若唐一行山河兩戒之說恐亦近穿鑿襄九年左傳遇艮之八一句孔疏云謂艮之第二爻不變者是八也周易以變為占占九六之爻連山歸藏以不變為占占七八之爻此固是矣然傳只云遇艮之八而不云艮之第二爻是八亦未免蹇澀查地圖山西河津縣是祖乙居耿之耿與解州鹽池相近左傳所謂沃饒而近盬也觀此則殷之河患乃在山西孔疏襄十一年作三軍云春秋之世兵革遞興出軍多少量敵強弱士卒之數無復定凖成二年鞍之戰晉車八百乘計有六萬人惟三卿帥之此說甚明然復依鄭氏泥詩公徒三萬一言謂僖公時已有三軍自文公以來懼伯主之令軍多則貢賦多自減為二軍然其作其舍不見於經者非是故有所舍故不書生出許多葛藤孟氏使半為臣若子若弟叔孫氏使盡為臣此處文法亦甚蹇澀大意是言叔孫只取子弟不取父兄比季氏只得一半孟氏只取子弟之半比叔孫又只得一半若無昭五年傳則此處幾不可解又秦后子十里舍車終事八反亦蹇澀十二年疏因什吏二字知晉十人置吏異于周禮五人為伍之制亦最細師曠論衛出君與孟子腹心手足之意一般春秋于此亦只書曰衛侯出奔齊然有以警其君而無以警其臣畢竟可疑楚公子比鄭公子歸生齊陳乞本無其心必書曰弒正可與此同參襄草一年疏云杜解地邑自為其例言在者指知其處言有者以示不審此例最好孔疏襄草二年御叔以臧武仲為聖人云此聖字與周禮知仁聖義中和尚書惟狂克念作聖作聖詩人之齊聖皇父孔聖諸聖字一例看最是程鄭降階之言本屬善言然因其平素偃蹇知其决不因學問而思謙退故曰不在程鄭必是勢窘而然襄草五年楚蒍掩度山林鳩藪澤辨京陵表淳鹵數疆潦規偃豬町原防牧隰臯井衍沃賈逵以為此九事是賦稅差品山林之地九夫為度九度而當一井藪澤之地九夫為鳩八鳩而當一井京陵以下以次而重如周禮一易再易不易之意杜孔雖不用其說然疏內仍詳載之蓋左氏之㫖雖未必然然亦可見土田當分等則從古而然然明謂視民如子見不仁者誅之子産喜其語而其告太叔則曰政如農功日夜思之吾于是歎子産之善用言也蓋愛民而惡不仁為政之道無出此矣而非思則愛惡或至於偏觀子産都鄙有章上下有服及處子析子南之際豈漫然愛惡者哉其得力於思深矣襄草七年傳云仲尼使舉是禮也以為多文辭疏云仲尼見其事善其言使弟子舉是禮以為後人之法觀此則知禮記所𫐠不必皆三代之制亦有春秋卿大夫所行而仲尼採之者宋之盟叔孫以違命貶雖有小是不録杜預之說最是而疏闡之亦最明晏子云在外不得宰我一邑句解云君出亡在外雖我一故邑尚不得主之况邶殿乎此說甚是疏以宰訓益以外為在邶殿之外覺費解孔疏解小雅大雅云小雅所陳皆小事也大雅所陳皆大事也王道既衰變雅並作取小雅之音歌其政事之變者謂之變小雅取大雅之音歌其政事之變者謂之變大雅不復由政事之大小也又云正雅與二南同時故曰周德之衰杜注云衰小也言是周未盛大之時蓋杜注以季子之歎是歎正小雅服䖍劉炫則以為歎變小雅杜似長亥有二首六身孔疏云古之亥字體殊不然蓋春秋時亥字有二六之體異於古制亦異於小篆蒍子馮之戒懼也而其子蒍掩至于被戮且掩又非不賢者甚矣權勢之不可戀也此叔孫昭子所以致歎于髙疆也范武子之戒變鄭公孫黑肱之貴而能貧有位者不可不三復三魚堂賸言卷三
