body:
  text: 三魚堂賸言卷五監察御史贈內閣學士陸隴其撰看張爾公大全辨見其於朱子分析處必強辨其合如大學三綱領至善在明新外朱子或問云慮其禮雖粗復而有不純己雖粗克而有不盡其說精矣而必辨之曰有不盡不可謂之克有不純便不可謂之復粗克粗復之說似是而非八條目正修在誠意外朱子小注云在官街上差了路其說精矣而必辨之曰信如朱子所云則是誠意尚有缺陷幸有正修兩段可以補其不足果爾則子思孟子之言誠身而不及正修其差錯寧有己乎正修兩傳雖屬身心工夫仍在誠意噫是未知朱子所謂必析之有以極其精而不亂然後合之有以盡其大而無餘也閲黃太冲文知山隂之學其病只在不知朱子所謂析之極其精合之盡其大二語故朱子分八條目而山隂則以誠意為了義曰致知致此也格物格此也朱子以主敬置八條目之外而山隂則以誠意當主敬太冲與姜定菴書云致知之外乃澄然未發之體因觳觫而不忍因乍見而惻隱此知之已發者吾之所致者在澄然之體由澄然而發見發見者無所容吾致也噫如此說則朱子當因其所發而遂明之一語如何解乎先儒謂格物之外無致知工夫此言有味蓋舍格物而言致知工夫則惟有良知耳良知不可恃也惟有主靜耳主靜亦不可恃也講致知格物見朱子言用力之方云或考之事為之著或察之念慮之微或求之文字之中或索之講論之際愚意此四句中皆有學問思辨在宋崑友以所作致知格物文示余曰學術異同俱自此句始故欲借此以正世之謬其文大抵謂格物工夫緊接小學小學之後知識漸開亦漸淆故格物者所以擴充其聰明範圍其知識者也豈無生知良知而生知不恆有良知不可恃也做格物工夫似偏似渙而不厭其偏不厭其渙循其緩急輕重審其難易淺深由其當然以及其所以然由勉而幾于安此所以為小學之終而大學之始也致知在格物猶曰致知者必教之格物云耳全在教者主張其論甚正魚裳兄弟來豫舉盤銘及切磋琢磨之義商之旗公謂茍日新三句內句句皆有切磋琢磨工夫豫首肯之講如保赤子節因思天下事皆不可不學而能此只指一㸃誠心說耳即保赤子中亦有許多事須學而能此緣在致知格物後故只重一㸃誠心說講論語序說辨孔子始生之日查春秋大全公羊言襄公二十一年十有一月庚子孔子生穀梁則書庚子于十月之後以此年十月庚辰朔考之則十一月無庚子庚子乃十月二十一日也穀梁是而公羊非周十月今八月是孔子生日為八月二十一日無疑也然以史記考之則孔子之生乃在襄公二十二年杜預亦主之朱子論語序說用史記生年而序公羊月日於下於是說者自二十一年十月庚辰朔推之除朔虛六日則以二十二年十月二十七日庚子為孔子生日實今之八月二十七日也二說未詳孰是通考吳氏程取索隱之說謂史記以周正十一月為屬明年故誤而朱子因之當再考大抵以為二十一日生則當是己酉嵗生七十四歲以為二十七日生則當是庚戌歲生七十三嵗宋崑友論人不知而不愠云人非必君相一家之中父子兄弟亦人也如舜之處頑嚚而克諧以孝即所謂人不知而不愠也無友不如己者須先看道之同不同若道先不同了又不必論如不如又須看心術之同不同若心術不同矣亦不必論如不如此不如己者與損者三友及道不同二章有别夫子至於是邦也必聞其政此特自其一邊言之耳有必聞者亦有必不聞者如橫征暴斂之事豈肯使夫子知之不失其親一句工夫最難一有所失費許多深思逺慮只救得一半評奚士柱由誨女一節文見得注中所謂自欺不是掩飾只是氣粗不能自知看知其說者之於天下也二句文覺得此章即是一貫道理魏庸齊疑好仁惡不仁隱居求志行義逹道見過內自訟好德如好色顔曾漆雕開仲弓子路南容儘足以當之何云未見張簣山答之有二意一則云夫子所歎未見或偶以此勉人或有所感而云非竟以為空谷足音一則云夫子生平無一日非望道未見之心則是數者尚不能以信諸己安能以信諸人此又是就其極而言當合看末又言此仍非必不可幾之事誠能從內自訟做起由勉歸熟安知不將旦暮遇之尤妙與學生論子出一題宜主教不躐等說時文多亂拈忠只是一心恕則千變萬化做得未熟忠自忠恕自恕做得熟了忠自能恕忠信亦然忠是一心之誠信是隨事之誠忠到熟時自無不信未到熟時固有忠而不信者喻義喻利皆有一貫氣象君子之心融洽于義發出來無非是義小人之心融洽于利發出來無非是利吾斯之未能信一語意味深長蓋大綱之信猶易節目之信最難知處信猶易行處信最難順處信猶易逆處信最難漆雕開已見大意而能謙退精進所以子說如陳清瀾學蔀通辨亦可謂已見大意但少此一段氣象心有已發未發之分其發也又有存心處事之分當理而無私心乃是合存心處事言之不二過之境界其難處有二一則因循怠忽牽制過將復生一則雖有心改過而見識未到如因噎廢食矯枉過正亦是二過張簣山集內有與魏庸齊論尋孔顔樂處庸齊云舍功問效如舍舟渡水舍梯登屋終日尋不能得否則講說髙妙動涉禪機茫無把捉不若溯流窮源從切實下手處尋去水到渠成自有樂地簣山云樂者即吾之本體成之性得之天非從外面攙和非從後來添設獨恐為境遷為物撓為欲蔽遂舉本來樂體被無端怨尤填胸滿膺非用一番工夫一番尋求便說曠逹放誕總非向來真樂又云識本體固難復本體尤難二先生說尋字最好皆本集注朱子之意庸齊又云從何尋曰下學上逹克己復禮簣山又自述其山房舊有扁命云尋孔顔樂處聨云問孔子何以樂曰發憤忘食問顔子何以樂曰既竭吾才又云言孔顔樂處即知思孟樂處皆足補集注所未及博施濟衆修己以敬二章一是順說一是逆說合看可見體用之妙亡而為有三句無忌憚之小人如此鄉願亦如此此二種人皆與有恆相反一則務以驚人一則務以悅人看讀書録見文清云知崇如博文禮卑如約禮又云道問學是知崇尊德性是禮卑覺中庸論語得此豁然閲席生衣敝縕袍章文見包孝肅海忠介猶不免以是道為臧聖人屏氣似不息不是升堂時始屛是無刻不調其氣故雖升堂時自下而上氣易動而不動與席生講克己二字云己能入於視聼言動亦能入於喜怒哀樂子臣弟友禮樂刑政能急能緩能顯能隱有剛有柔有克伐怨欲意必固我或生於氣質或生於習俗千態萬狀而總名之曰已曾㸃之春風沂水即子思之鳶飛魚躍蓋以道極於至大而無外而僅於兵農禮樂求之則狹矣道入於至小而無間而僅於兵農禮樂求之則粗矣隨時隨處隨人皆有當然之理有一毫缺缺便非所以報知己今日有一毫缺缺他日便難保其無缺缺此即伊尹一夫不獲時豫之辜耕莘樂道意思故謂其有堯舜氣象但㸃只此見得未能行得漆雕開所未信者亦是指此境界簣山語録云曾㸃之樂是日月至焉之樂顔子之樂是三月不違之樂但有生熟之分皆是實見與虛見不同看得最好子路雖稱忠信明決片言可以折獄然獄亦有子路所不能決者或人雖服而理未合或事可疑而情難得非忠信明決之無用蓋子路之忠信明決與聖人之忠信明決猶有間也亦有聖人之所不知不能者夫子言舉爾所知爾所不知人其舍諸見聖人論治與綜核之治真有天壤之别綜核之徒論選舉未有不急防人之欺蔽者聖人則所重在舉爾所知蓋在我一段至誠之念正大之氣未有不能動人者何患賢才之不可盡知耶若沾沾以綜核為事則是名家之所為一法立而一弊生其為紛擾不亦甚乎此當與視觀察者同看刁䝉吉講冉子退朝章云注謂正名分者正政之名則為君之分正事之名則為臣之分也講名分二字最明春秋之末漸成一利口世界莊子一書以利口談理戰國䇿一書以利口議事夫子所以思木訥之近仁然則思剛毅者何曰此則以鄉願多也朋友切切偲偲分數要看是何等樣朋友當何等樣切偲其性情有剛柔之不同其病痛有深淺之不同其與我交又有久暫之不同雖皆當切偲然其中分數須當酌量看念臺學言見其論升沉得失之際不能徹底澄清一日乘間又竊發因思克伐怨欲不行不但是不行到外面呌不得仁就使連念頭都禁住了而其根尚潛伏如程子之見獵畢竟有時而發亦呌未得仁陽明病瘧之喻正是此意中庸所謂無所偏倚是無纎毫病根潛伏也既又思之朱子言心之未發如鑑空衡平無正不正之可言又曰未發之前氣不用事若與此不同何故曰朱子所言是就無病之人說無病之人只怕得發時走作若有病根潛伏則當其未發便呌不得無偏倚先覺二字有覺之而有以制之者有覺之而不必有以制之者亦有竟不覺而無礙其為先覺者天下事不如意者十常八九自世俗觀之不由于天便由于人故天無處不可怨人無處不可尤自君子觀之只是我認理不精處置得不停當無天之可怨無人之可尤不怨不尤之義真妙天之可怨處亦多矣人之可尤處亦多矣大抵天人多囿於氣質中我以義理律之則見其可怨尤我亦以氣質衡之則益見其可怨尤惟靜以聼之而止盡我所當為久之天與人亦當見諒即未見諒而我之浩然者質之義理而無愧怍此聖人所謂知我其天也或言子貢聞一貫之語倘有人問之曰何謂也當如何應之余曰應之曰夫子之道居敬窮理而已或疑敬字不屬知余云敬統知行世衰道微君子獨卓然秉正羣起而咻之者不知凡幾也我既不能過化存神又未能磨不磷涅不淄而與之相為謀危矣非為所誘而不知則日角勝而不已故夫子告之曰道不同不相為謀此為大賢以下言之也不相謀有二法一如孟子之待楊墨一如孟子之待鄉願非徒棄之而已也故詩曰他山之石可以攻玉閲子張問仁節㑹墨因思聖門所謂仁者豈非所謂一乎仁則一矣勇而無禮是輕浮一流果敢而窒是執物一流勇與剛之分亦如此逸民章多就其清一邉言不比孟子分清和閲山東首題墨見其以平實淡漠虛靜等字講夫子之墻最妙乃知墻如中庸之言絅宗廟百官猶中庸之言錦絅在外人便不知其錦大全中未有此說然却不可易講墻字要求著落猶由之瑟章堂室字須有著落也大全中不曾說到此愚前看大全時亦不曾見及此三魚堂賸言卷五
