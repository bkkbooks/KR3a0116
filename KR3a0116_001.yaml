body:
  text: 三魚堂賸言卷一監察御史贈内閣學士陸隴其撰閱天原𤼵微鮑寜辨正曰朱子易本義以隂陽之變解易字以隂陽之理名太極則太極為易之本明矣節齋蔡氏謂易乃太極之所自出又解易字作無極字則易反在太極之先矣豈不大乖乎節齋又云主太極而言則太極在隂陽之先主隂陽而言則太極在隂陽之内亦非朱子太極無不在之意而未知理氣本無先後也節齋又謂隂静陽動静者常偏居動者常去來與周子一動一静互為其根之㫖亦不同而天原𤼵微皆承其謬而未之正辨正極有功於𤼵微偶思乾南坤北而交則應乾北坤南然後天方位乾西北坤西南各退位居之者想是日中則昃月盈則虧怕處其盛之意雲峰胡氏云朱子嘗欲於方圓圖内取出方圖在外庶圓圖虚中以象太極然愚意取出方圖固足以見太極之虛置一方圖于内尤足以見太極之虚而實易有三百八十四爻凡一事便有三百八十四様㸔這事做的是何人這箇人所處是何位所遇是何時㸔復卦咸卦見朱子於復卦象註曰安静以飬微陽也於咸卦初爻註曰此卦雖主於感然六爻皆宜静而不宜動也復之安静是言初動之時宜静以飬之咸之宜静是言當動之際宜静以審之皆是周子主静中意而周子之主静則又不止於此也臯陶言載采采第一箇采字即是視其所以第二箇采字便有觀由察安意大禹思日孜孜躬陳治水之績不以為嫌與趙充國不用浩星賜之計同一老臣保治之志㸔徐九一書經大全禹貢恒衛既從註唐割鹿城置鹿渾縣渾似當作澤又邢趙深三州為大陸者得之邢似當作祁查一統志可見孫北海禹貢考謂碣石現在永平未嘗淪入于海此似其獨得之見夏彞仲禹貢注亦未之知也禹䟽九河當時必更有蓄泄之法蓋河者不可不分亦不可分者也不分則勢盛而易潰分則流緩而沙淤故分亦決不分亦決者也禹既䟽九河必立蓄泄之法如今之閘座然水大則通之以殺其勢水緩則閉之而勿分其力三代以下守其法所以無河患後世廢之則潰決而不可為矣愚因潘季馴之治河而悟及于此閱咸有一徳蔡註恍然有悟予向疑一貫之㫖孔門自曾子而外不輕以示人而伊尹輙以告太甲曰善無常主協于克一得無疑其躐等無序乎細玩無自廣以狹人之註然後知其用功之要全在乎此而所謂恊于克一者乃是教以立志必期至乎此而非其下手工夫也蔡註體㑹及此可謂精矣夫子告哀公曰所以行之者一亦是此意而必繼之曰凡事豫則立又繼之以擇善固執皆是下手工夫講麟之趾振振公子見得公子之氣習是最難仁厚的此不是文王后妃之徳不能到此騶虞壹𤼵五豝朱傳於庶類繁殖見其仁註䟽以不盡殺見其仁不如朱傳之大㸔左傳伶州鳩論景王鑄大鐘悟詩所云無田甫田惟莠驕驕即是此理若讀書人不知循序漸進之法便為伶州鳩甫田詩人所譏㸔唐風山有樞講章云忌作晉人曠達語乃知此詩與古詩所云生年不滿百常懐千歳憂晝短苦夜長何不秉燭遊大相逺蓋惟恐儉不中禮則虚過一生急欲自範於禮有朝聞夕死可矣之意是相勉以好樂無荒之樂非相勉以衣裳楚楚之樂不是要及時行樂是要及時行禮正所謂憂深思逺也蟋蟀之憂深思逺蓋惟恐解其拘者或失於縱廣其儉者或荒於奢山樞之憂深思逺則又鞭䇿之使急歸於不拘不縱不儉不奢之域也有蟋蟀之憂則不至於矯枉過正矣有山樞之憂則不至於因循不斷矣他人是愉亦不是怕落他人手亦是恐他人矯我之枉遂至于奢縱㸔詩燮伐大商朱子以順天命解燮字註䟽則以國語伶州鳩之言五位三所者解之便如今星家之講命一般是漢儒之不如宋儒處詩庤乃錢鎛奄觀銍艾錢以啓土鎛以去草銍以穫稻錢又謂之銚又作鍬又即臿蓋即今南方所謂鏵也鎛又謂之鋤又作鉏今南北皆謂之鋤但南狹而北濶耳銍又謂之鎌錢鎛銍皆在耒耜之外今之犂乃耒耜之變古人不用牛耕故不曰犂而曰耒耜見周禮匠人註䟽按今犂頭鐡器及下種之器名樓者其頭上樓北人皆謂之鏵然則銚與鏵即耒與耜三才圖㑹下種器名樓車絲衣章朱子既不依註䟽繹祭之説而門堂二字尚仍註䟽之舊而偶未改蓋正祭省器在廟堂不於門堂見詩經説約顧麟士亦引魯詩世學甚矣偽書之易悞人也明舒芬謂周禮者至誠盡性之書也又謂周禮與儀禮戴記猶蜀之於吳魏也賈氏以儀禮為本周禮為末謬妄已甚朱子乃不正之是其所惑也舒氏尊周禮是也而以此抑儀禮則過矣其尊周子而貶程子亦是此病三魚堂賸言卷一
