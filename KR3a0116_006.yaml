body:
  text: 三魚堂賸言卷六監察御史贈內閣學士陸隴其撰天命之謂性三句俱在大學首節明德二字內戒懼愼獨則在上一箇明字內李厚菴言存養工夫該動靜大學八條目不言存養是接小學來句句內有存養作腳也中庸言存養亦便包得擇執工夫下面只是抽出言之耳因言冉永光以存養專屬靜之非看中庸喜怒哀樂即或問見朱子謂龜山其慟其喜中固自若之説雜於佛老恍然見聖賢應事之心與異端不同異端之心當喜怒哀樂之時其心漠然同於木石而姑外示如此之形聖賢之心當喜怒哀樂之時則是未發之理發見在此一事一物之中皆可謂之無心而誠偽之相去天淵子思前言性道後復言中和蓋言性道或疑其迂逺而道不可離之意猶未甚顯言中和則必不能不謂之大本逹道而不可離也明矣在物為理即逹道也處物為義即逹德也達道達德俱是性亦俱是命中庸首章言道不言德者蓋道與德分言之則為二專言之則言德可以包道言道可以包德為靈邑諸生評中也者天下之大本也文見其多云虛能生實豫謂惟實能生虛虛安能生實謂虛能生實者此佛老之見也朱子無極而太極之辨專為此天地位只是天下大綱都好了故致中便能如此此尚未難萬物育是天下事事都好了須致和方能如此此最是難事雖云體立而後用行然用行更難于體立天命率性大德小德德性問學皆可如此分配天地位萬物育猶言大綱正萬目舉李厚菴講不行不明章言子弟中有知者愚者不當急求其明且責其行能行然後能明子弟中有賢者不肖者不當急求其行且責其明能明然後能行講以人治人見雲峰胡氏曰以衆人望人不敢遽以聖人責人正與或問意合史氏伯璿非之者誤也所謂衆人望人中亦有至善在所以行之者一也此一字與一貫之一本同但一貫之一是功夫熟後得手處此一字起手即要是徹始徹終者厚菴欲以尊德性專就主敬言而以道問學包力行夢中體認孟子無傷也是乃仁術也一莭此當與釣而不綱弋不射宿不殺胎不伐夭同看愛物之仁只應如此此其所以為無傷也覺津津有味孟子養氣即制外養中之法先立乎大是內外本末交相培養義襲而取不但告子即從事知言養氣者工夫一分未到一分便是義襲薛文清論養氣章云知言者盡心知性物格知至之功又在持志之先理明則能持志集義而又無忘無助長則浩然之氣自生矣余向疑知言持志是一項事厯觀諸講章無有説得明白者得此豁然又曰主敬可以持志少欲可以養氣此又補本章所未及古之井田隨其地宜非通天下可行也觀左傳所云疆以周索疆以戎索及蒍掩牧隰臯井衍沃可見又周禮載師注疏尤明孟子所云野九一國中什一者恐亦是就滕之地形而言李見羅云仕止久速外别無秋陽江漢此言甚好然却未盡如喜怒哀樂子臣弟友皆是秋陽江漢又以一貫言之則一箇秋陽江漢貫萬箇秋陽江漢閲天之髙也一節文思此章所謂鑿有二種一是不讀書之鑿一是多讀書之鑿不讀書之鑿不知故者也多讀書之鑿不知故之利者也講千嵗之日至可坐而致覺此章易為良知家所借蓋鑿與不鑿其辨在毫釐之間非居敬窮理未易明白學生問伯夷伊尹栁下惠與楊墨同異愚因思夷尹惠是中道上之偏楊墨是中道外之偏譬如三間廳夷尹惠皆在中一間但略有些偏若楊墨則偏在兩旁著壁去了孟子云仁人心也是指仁為心象山是指心為仁仁義禮智四者各有體用而以其流行之序言之仁初發出只是一點萌芽及其盛則為禮及其成則為義既成而藏則為智孟子所以指仁為人心義為人路其實仁義禮智皆在心先立乎大立字工夫兼持志飬氣直解專以持志講此立字豈養氣工夫在從小體內乎殊誤與學生講登東山節問曰孔子既如是不可及何以又曰彼丈夫也我丈夫也余曰且未説及此講至末節曰孔子豈不可及哉但學之當有序閲聖人百世之師章文想親炙二字見成周風俗之厚伯夷有功焉春秋之末至于戰國栁下惠有功焉閲大全養心莫善章見黃勉齋一條云孟子嘗言求放心矣又言存其心矣操之則存舍之則亡心之存亡決於操舍而又曰莫善於寡欲何也操存固學者之先務然人惟一心而攻之者衆聲色臭味交乎外榮辱利害動乎內隨感而應無有窮已則清明純一之體又安能保其常存而不放哉此孟子發明操存之説而又以為莫善於寡欲也雖然寡欲固善矣然非真知夫天理人欲之分則何以施克治之功哉故格物致知又所以為寡欲之要此又學者之所當察也愚因想及求放心章雙峰述勉齋之説曰此章首言人心是言仁乃人之心次言放其心而不知求末言學問之道非止一端如講習討論玩索涵養持守踐行擴充克治皆是其所以如此者非有他也不過求我所失之仁而已此乃學問之道也三個心字脈絡聨貫皆是指仁而言依後一條則是寡欲即在求放心之內依前一條則似寡欲又在求放心之外二條不同然其實一也寡欲即在求放心內孟子於養心章則又抽出言之耳即如操存章程子曰操之之道敬以直內而已亦是抽出一敬言之由堯舜章末二句與好辨章吾為此懼一句相合此不是誇張語乃是憂深慮逺之語當時守先待後一段臨深履薄光景直從堯舜之兢業發來思輯四書困勉録例注疏大全或問俱不必編入不欲廢成書也陸王之學不必多辨有學蔀通辨在也內當分學問思辨行五項採宋元諸儒之言是謂學採明興以來及近年諸儒之言是謂問發先儒之未發以愚按冠之是謂思辨諸説之同異以愚又按冠之是謂辨策勵學者勿徒為空言以學者讀此章五字冠之是謂行讀太極圖説注深有味乎繼之者善一繼字繼之即所謂萬物資始也不言始而言繼蓋隂陽無始也此等處朱子發得真是十分明白讀書録謂太極純乎理陽動隂靜兼理氣又謂太極在陽動隂靜之前此等處皆看得未融洽非程子體用一源顯微無間動靜無端隂陽無始之意太極圖中之五行非指鑄鼎之金作室之木江河之水鑽燧之火也乃指天地間隂陽之氣有此五者耳程子體用一源顯微無間二語是周子無極而太極一句內意動靜無端隂陽無始二語是周子動極而靜以下之意薛文清講動靜隂陽最明講體用顯微却有可疑當查呂涇野集有云盈天地間皆氣也氣而形皆物也物而則皆道也知形之顯於有即道之妙于無知道之妙于無即形之顯於有非舍形氣之外復有所謂道也此論可羽翼太極圖説聖人定之以中正仁義此即所謂道心常為之主而人心聼命焉定之之字指人心承上文善惡分來學蔀通辨言周子主靜靜字只好做敬字看此最宜玩閲念臺學言見其以靜亦靜動亦靜講周子主靜二字據朱子太極圖解則主靜二字全不是此意此乃是程子定性書之意似不當牽而一之近思録載通書第三章而不載第一章二章以其不出太極圖説之意也第三章一幾字乃補圖説所未詳即邵子所云一陽初動處萬物未生時也圖説言太極通書便言誠圖説言陽動隂靜通書便言誠通誠復圖説言五行通書便言元亨利貞圖説言中正仁義通書便言五常百行圖説言修吉悖凶通書便言邪暗塞果確近思録第三段程子論中和此是朱子因中和舊説之非而特載此閲近思録明道論上天之載無聲無臭其體則謂之易云因思書言人心道心易言形上形下孟子浩然之氣四字却括盡而曰浩然便已理氣合一所謂器亦道道亦器也近思録不載橫渠由太虛有天之名條及一故神想以其詞未逹意與近思録以伊川顔子論列明道定性書前此有深意蓋朱子嘗言定性書一篇之中都不見一個下手處又云定性書不是正心誠意工夫是正心誠意以後事故將伊川之論列于前是即定性下手工夫也查近思録橫渠心統性情一條為天地立心一條皆正蒙所無儒宗理要即採之性理近思録而列於拾遺內蓋張子之書不能盡傳矣將小學示學生因看立教篇內則一條歎古人之教必防之於未然必使之以漸進所以教無不成與學生講小學明倫篇內則子事父母一條想見古人一團愛敬之意融結而出分不得某處是愛某處是敬與學生講小學見禮記説不登髙不臨深不茍訾不茍笑夫茍訾茍笑與登髙臨深一樣可不畏哉三魚堂賸言卷六
