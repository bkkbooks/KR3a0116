body:
  text: 三魚堂賸言卷八監察御史贈內閣學士陸隴其撰閲學蔀通辨見象山對朱濟道言收拾精神自立主宰當惻隱時自然惻隱當羞惡時自然羞惡因思象山陽明景逸念臺皆是收拾精神一路工夫皆是心學但象山主靜陽明則不分動靜景逸主靜念臺則不分動靜象山陽明則竟不要讀書窮理景逸念臺則略及於讀書窮理象山陽明則指理在心外景逸念臺則指理在心內究竟則一樣指理在心外者如鏡之影指理在心內者如樹之根得失自不同辨有明之理學較宋更難以陽明之功業髙劉之節義皆天下所信服如順風而􅮑故辨之尤難今人見陽明之功業便以譏之者為刻不知管夷吾之在春秋是何等樣功業孔孟只以一小字一卑字斷之安得以其功而信其學哉且陽明即有功亦不過在一時而以朱子為楊墨以孔子為九千鎰其得罪在萬世吾豈能為之解耶真西山集夜氣針曰必齋其心必肅其躬不敢弛然自放於牀第之上讀至此不覺悚然又云以理論氣者濓溪先生之學也以理論數者安樂先生之學也二語最精黃太沖學案序述有明一代之儒者可謂有功而議論不無偏僻蓋以蕺山一家之言而斷諸儒之同異自然如此愚因思經師與人師不同而人師內又有二種有興起之師有成德之師若蕺山先生者以為興起之師則可以為成德之師則不可而太沖尊之太過所以多費周旋髙忠憲與管登之辨云若謂以覺包理則理乃在外又云謂氣在虛空中則是張子所謂以萬象為太虛中所見之物虛是虛氣是氣不相資入者矣此一條大可理會大抵梁溪一派看得性儘明白却不認得性中條目又閲其靜坐説乃知髙子所謂性體亦是指心亦大異于程朱矣其不欲言以覺包理特欲自伸其見耳閲徐鴻洲信古餘論見其論西銘是仁體因悟與萬物流通者仁體也無物不有者仁體也無時不然者仁體也故中庸費隱章論語子在川上章與西銘皆是言仁體閲紫陽通志見髙彚旃格致論其學似正於景逸又刁蒙吉寄嚴佩之書不滿涇陽而深推景逸以此與陳幾亭同配享於道南祠其所著潛室劄記中亦多格論但於景逸覺服膺太過耳又施璜所著思誠録訓蒙諸條其論甚正又通志所載江知默字月巖汪學聖字惕若皆有志於學而以梁溪為宗者閲顧涇凡與髙景逸論學問當從狂狷起腳書此其病根看薛方山考亭淵源録序言朱子之言孔子教人之法也陸子之言孟子教人之法也不覺太息孔孟豈有二法哉方山序中既言老而知朱學之精而又為調停之説如此蓋終不敢直指陸學為非也又其末言象山晚年亦得力於朱子以救陽明朱子晚年得力於象山之説亦屬調停考亭淵源録第十八卷載朱子告郭友仁有半日讀書半日靜坐之説郭是從禪學入門者恐此所述未必確用功如何可這樣限定第二十卷劉淳叟欲做虛靜工夫朱子與言李延平教人靜坐之不然可見郭友仁所述未確呂涇野集有云衡有銖兩鈞石之星也若為塵垢所掩則不可得而辨矣天有斗樞三垣五緯二十八宿之星也若為雲霧所障則不可得而辨矣夫人心之有星猶天與衡也此一段説心最好又云如使顔子之父母不悅於簞瓢乃顔子自以為樂而不改則雖夫子豈肯稱其賢此亦説得最好又云夫子所謂一以貫之者其約乎故顔子曰約我以禮此看約禮即一貫與愚向所見不同又云時有升降隂陽盡之矣學無止足鳶魚見之矣隂陽盡窮通得喪皆非在我者也鳶魚見體用顯微皆非在物者也是見道之言又云禹之導江河在拜昌言何以知言之昌在精一以執中未至於禹者在求其病之所切而去之如牛之訒言參之三省説得真妙又云孔門論學惟仁為大學仁惟禮為急經禮三百曲禮三千皆仁也天體物而無不在仁體事而無不存夫子告顔淵之為仁以非禮勿視聼言動亦是意乎按此一條可見約禮即是一貫豫向疑一貫與此約字不同非也較王學質疑因思程子言在物為理處物為義又云性即理也此處宜將大學或問中所云心雖主乎一身而其體之虛靈足以管乎天下之理理雖𣪚在萬物而其用之微妙實不外乎一人之心合看方明仁義禮智皆心之用管乎天下之理者也閲孫徴君年譜歎近年來南方有一黃黎州北方有一孫鍾元皆是君子然天下學者多被他教得不清楚孫鍾元鹿伯順一生苦志只做得不踐迹的事鹿江村孫徴君皆一代偉人其品之髙則所謂不忮不求何用不臧者也其學之勇則所謂未之能行惟恐有聞者也只是不虛心不細心子路當日亦是這個氣象賴聖人之裁成所以終成千古大賢看學蔀通辨後編朱子答廖子晦一條覺明鏡止可喻心不可喻性朱子大學或問中有鑑空衡平之説論顔子明睿所照亦以明鏡言之皆只是言心至象山論孟子萬物皆備而以鏡中看花言之則是以鏡喻性矣大謬此陳清瀾所以謂孟子萬物皆備是以萬物之理言陸學之萬物皆備是以萬物之影象言以六經為聖人糟粕者猶以虛無之見置在六經外以六經為我注腳者直以虛無之見置在六經內故王弼之易何晏之論語猶有可取而象山之解經必不可從也閲儒宗理要內緒言覺其踈淺黃太沖撰周海門傳云性理也心氣也陽明言無善無惡心之體非言性無善無不善以無善無不善為性者海門之咎也然陽明不曰心即理乎何可掩也大抵昔之為王學者樂其病今之為王學者掩其病刁蒙吉辨道録載羅文莊之言曰理一分殊四字本程子論西銘之言其言至簡而推之天下之理無所不盡持此以論性自不須立天命氣質之兩名按整菴尊理一分殊之語可也而便欲以此破除天命氣質之名則非矣但知理氣之合而不知理氣之分可乎陳遷鶴言閩中從來不染於姚江之學惟一李贄出仕於外與王龍溪交遂習為橫議朱陸皆以鏡喻心然一是真明鏡一是含糊之鏡辨學術異同若在經書文義上辨之則彼此膠執葛藤無已矣且舍文義而單論下手工夫則得失自見今之回護姚江者有二一則以程朱之意解姚江之語此不過欲寬姚江其病猶小一則以姚江之意解程朱之語此則直欲誣程朱其罪大昔人云進思盡忠退思補過此與夫子主忠信徙義之意同我人存一至誠無偽之心進而有為可謂忠矣然其間輕重緩急過差而不合於義者儘多故進思盡忠者必退思補過主忠信者必徙義陽明以致良知三字為學豈知此也哉姚江一派學術日異而月不同正嘉之際其詞詖嘉隆之際其詞淫萬厯以後其詞邪至今日其詞遁日求去過而過不能去者一則起於欲根未盡一則起於習氣未除一則起于見識未真一篇朱子行狀即是一篇太極圖説一篇太極圖説即是一篇朱子行狀人之喜怒各有氣象程子欲人忘其怒而觀理之是非愚更欲人忘其怒而觀怒之氣象儘有怒得是而氣象不好者人生處處要樹立一界限事事要斟酌一分寸天下道理只得一箇旋相為宮之法在醫家則謂之君臣佐使大人言熊見可之講書但自講一番而不能使其委曲入於童子之耳豫因悟聖人言忠又必言恕蓋能盡心而不能推己其弊如此春秋之義不責下責上不責小人責君子大易之義不憂衰而憂盛以此思之人生何時可不戒謹三魚堂賸言卷八
