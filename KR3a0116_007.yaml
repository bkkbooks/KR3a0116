body:
  text: 三魚堂賸言卷七監察御史贈內閣學士陸隴其撰莊渠遺書內有與余子積書云朱子晚年定論近始見之似不計年之先後論之異同但合己意即收載之耳今亦無論其他如載答何叔京書所謂因良心發見之微猛省提撕使心不放便是做工夫本領此正中年以前未定之論與中和舊説相同也文公論心學凡三變如存齋記所謂心之為物不可以形體求不可以聞見得惟存之之久則日用之間若有見焉此則少年學禪見得昭昭靈靈意思及見延平盡悟其失後會南軒始聞五峰之學以察識端倪為最初下手處未免闕却平時涵養一節工夫别南軒詩所謂惟應酬酢處特逹見本根答何叔京書尾謂南軒入處精切皆謂此也中和舊説論此尤詳其後自悟其失改定已發未發之論然後體用不偏動靜交致其力工夫方得渾全此其終身定見也祭南軒文始所同嚌而終所共棄其此類也夫大抵先生自其初年固已卓然有志聖學然未免為言語文字分却工夫至於中年以後方有一規模今日正當因先生已定之論而反證其未定者庶幾有所持循也觀此條莊渠之學頗正唐荆川編諸儒語要十卷髙景逸序云前六卷皆諸先生所自得語後四卷則辨析同異然前六卷載周程張朱五先生上蔡龜山五峰南軒之語而終以象山慈湖白沙陽明之語如河津餘干不得與焉則去取未當也後四卷雜取先儒之言而不注明姓氏則條例未善也又有續語要六卷則係薛文清吳康齋陳剩夫章楓山胡敬齋曹月川蔡虛齋魏莊渠徐飬齋尤西川呂涇野王心齋羅念菴羅近溪錢緒山王龍溪鄒東廓十七人之言宛陵黃一騰所纂輯也然遺羅整菴邵二泉亦不能無議徐飬齋尤西川未詳其為何人曹月川余未見其書今觀此編所載如云人氣聚而生氣散而死猶旦晝之必然安有死而復生為人生而復死為鬼往來不已而為輪回哉其言卓然又此編載其太極圖説述解序存疑録序儒者宗統譜序家規輯略序則其書皆傳於世尤西川大約是良知家然其言有甚精當者如云凡人有向善之心而又使人怪者多是自己勝心氣浮有以致之且如講説事理或論文説書少有所見即思壓人或是挾知故問人言未畢即伸己意此等處雖善亦惡也又或被人規警不肯認過改悔委曲輾轉尋路出脫則是彼有愛我之心我反拒之以此交人人誰容乎必須虛心平氣謙己下人求益不求勝可也又云未悉人言而輒伸己意此學者通病却在未悉輒伸之間不在議論是非處又云後生於前賢及前輩語言有與我不合者尤須下氣抑心反覆詳味必不可從然後斷之尤須克去勝心勿以一言得失輕議前人茍同之與立異皆私心也更學何事又云正大光明之士未免有以善服人之病又云風水家説壞人心術斷以大義禁而絶之可也六經四書不言風水茍於禮義有關孔孟當詳説之矣又云我儒言仁統四德然四德亦各統仁隨時隨事立名非有偏全之異理一而已按幾亭學言第一卷內又云禮義智皆仁也言心也若以事則仁義智皆禮而已矣是故教人為國以禮禮也者三者之暢於四支發於事業者也非禮則三者不可見亦無自行葉訒菴諄諄以躬行為重論學不以陽明為不是出衛爾錫潛齋寤言相示衛亦微向陽明者寤言中云立大志審幾微踏實地又云初學不制俗情無以見至情然至情未能發動終擺脫俗情不來故致曲集義皆因其所發而擴充之使有火然泉逹之勢又云學者未能中行寧為狂狷未可與權先求有立未能溫良恭儉讓先為剛毅木訥此皆名言陸桴亭性善圖説大旨謂人性之善正要在氣質上看此只説得朱子不離氣質一邊而略了不雜氣質一邊此圖甚不必作至論髙顧大旨而深取髙子無聲無臭即至善也一語謂陽明以善為有聲臭故説無善無惡豈知善固無聲無臭者乎不知髙子此語亦未是謂善無聲無臭是知無極而未知太極也知沖漠無朕而未知萬象森然已備也雖若異乎陽明之説而實與陽明之説同歸也張幹臣困知記序云始也以儒而託於禪既也以禪之實篡儒復以儒之名攻禪有崇正學之稱而已非正學有闢異端之論而已趨異端此數語曲盡嘉隆以來講學之弊較對困知記見整菴論薛文清氣有聚散理無聚散之説云氣之聚便是聚之理氣之散便是散之理惟其有聚有散是乃所謂理也若云一有一無則非理氣無縫隙之論矣此一段説得最好與整菴别處論理氣不同余前疑文清之言未融得此豁然容城孫竒逢字鍾元理學宗傳一書混朱陸陽明而一之蓋未知考正晚年定論也但慈湖龍溪近溪海門則列在末卷補遺之中蓋亦知其非矣理學宗傳章本清心性説曰心學傳自虞廷雖曰觀諸孩提之愛敬則人生之初其心本無不善觀之行道乞人不受呼蹴雖牿亡之後本心猶有未盡泯者不知此乃聖賢多方引誘或指點於未喪之前或指點于既喪之後無非欲人自識其本心以自存也不然人莫不為孩提也曾有漸長不為物引習移者乎乞人不受呼蹴曾有永保此心而勿喪者乎譬之榖種不種不生譬之真金不淘不淨近之論心學者如之何競指衆人見在之心即與聖人同也其説甚正然觀其意却似以心為主而以理從之不是以理為主而以心從之又見錢緒山論師門虛寂之旨曰變動周流虛以適變無思無為寂以通感大易之訓也自聖學衰而微言絶學者執于典要泥于思為變通感通之旨遂亡彼佛氏者乘其衰而入即吾儒之精髓用之以主持世教為吾儒者僅僅自守徒欲以虛聲拒之不足以服其心言及虛寂反從而避忌之不知此原是吾儒家常茶飯淪落失傳以至此耳此其援儒入墨推墨附儒可謂巧矣又論無善無惡曰目無色故能盡天下之色耳無聲故能盡萬物之聲心無善故能盡天下萬事之善直是放言無忌愚思王氏與髙弟語言流傳者宜倣陽明要書例摘而辨之庶使後世不再惑也象山云六經皆我注腳率天下之人而禍六經者必此言也夫此正朱子所謂以意捉志而非以意逆志也學者不知正學而輕於信人如理學宗傳所載賀克恭之于白沙南元善徐珊等之于陽明此正朱子所謂篤信而不好學則所信非其正者也南元善字大吉渭南人陽明座師聞講學遂列弟子列徐珊師陽明舉鄉試癸未南宮以心學為問隂以闢陽明珊讀䇿問歎曰吾烏能昧吾知以幸時好耶不對而出聞者難之曰尹彥明後一人也同門歐陽德魏良弼等直發師旨不諱亦在取列克恭刻白沙像懸于室黃太沖有沈清溪墓志言心性之辨亦明大約自羅整菴痛言象山陽明之後如髙景逸劉念臺皆不敢復指心為性但心性之辨雖明亦不過謂心為氣而性為理心之中有性而性非即心云爾其欲專守夫心以籠罩夫理則一也特陽明則視理在心外髙劉則視理在心內髙則以靜坐為主劉則以慎獨為主而謂無動無靜髙則似周子主靜之説劉則似程子定性之説及朱子中和初説而皆失其真江陵請開經筵疏有聖功已密而益密聖德日新而又新之語因思大學曰又日新孟子曰又從而振德之此兩又字最有味凡為學教人俱不可不知此又字汪苕文與計甫草書曰宗門之教固有不可思議者然欲合孔子之道與禪為一則辟諸傾乳入酒終于酒乳俱貶此條似是而非如此言却似宗門原有妙處但不可與吾儒合則亦何怪天下之從之哉昔之佞佛者多合三教今之佞佛者又多分三教張瑶山文集內有玉山遺響一種其一條云居茅屋中每從搜覽之暇默坐觀心焚香一炷雖本體照徹不得遽信覺山空人靜諸緣屏退點塵不到精神收拾透裏快然又其序云建我師祠以俎豆薛胡羅髙四先生則其學大抵微近于梁溪又一條云塘南王公云孔子曰無知陽明言知善知惡是良知姑就初學所及言之使從此透入必透到水窮山盡處乃可夫單提良知既為後人所疑而塘南又淺視良知提出無知水盡山窮從何下手此説得好又一條云水簾洞天半路斷始以梯升繼則甃石而上然空中階級意在速成根腳不平未及旬日雨過則崩程子曰須是大其心使開闢譬如九層之臺須大做腳始得又稱康節空中樓閣朱子言其四通八達須實地上安腳更好嗟嗟夫心之所之曰志學者立志當以君子自待以希聖希賢希天自期最不可薄視此身隘視此心掀天揭地全在腳根否則便小有成就亦非大規模久則且如風中草任其波靡如水上萍聼其飄蕩做得一分便損一分做得一層便壞一層豫是以因山徑之既成復傾不能不與學者求其所以立腳所以栽根此一條最警切不可不猛省夫康節猶空中樓閣也而况不如康節者乎簣山集云執著有執著之失和平亦有和平之失此非著實體認者不知又與人書云人欲合知行為一我必分知行為二單提致知不如直説篤行為明白切實若以力行工夫總以致良知三字盡之雖是透脫恐學者竟走入空寂一邊此條最足羽翼程朱又與熊青嶽書云若提明善二字謂可包知行則致良知亦可包知行姚江復起將有辭于我矣與前言同意不知青嶽何以有此論又與羅先生書云令師青老見解不偏考究有年其間道録頗與某私淑羅文莊之意有合又孫北老學問淵深所梓薛文清胡敬齋羅文莊髙存之四先生學約俱有不謀而同者按此則簣山所推重者此二人而已又有一書言宗儒語略前序後跋議論參差豫所取於簣山者正在于此人能勇於從善如此天下有何事哉使象山有此心則必無無極太極之爭使陽明有此心則必不執良知之説必不為晚年定論之書今人挾一偏之見恥屈於正論多方以求勝孰知先生之所以不可及者乃在于能屈耶氣能抗萬乘之威力足以却紛華靡麗之習乃區區整菴一書遂退然自下盡改其故學者非天下之大勇其孰能之乎閲張簣山與熊青嶽書論學問經濟雖不是兩箇畢竟經濟有從學問來者亦有不從學問來者從學問來者學顔子之學即志伊尹之志不從學問來者則為驕吝為器小為執拗甚至為姦險非不自謂有猷有為而其實毒蒼生而誤國事者即此自命為經濟之人其論最快簣山謂夫子之道中以貫之愚謂曽子言忠恕是誠以貫之若程朱重主敬則又是敬以貫之此當互看簣山語録上卷云學問止有漸進工夫别無頓悟法門又云諸家言自然言頓悟不問元氣虛實専用表散之劑不害人不止矣此最足見其學之正又云儒者言學謂人所説過者不必更説然舍人所説過者更何從説聖賢言語愈讀愈有味越講越無窮又深取章楓山先儒之言已盡之説此足見其學之朴實又論氣云無動無靜以所行有動有靜矣氣無聚無散以所附有聚有散矣論隂陽云隂陽有相生之時無未生之時此又足見其體認之細又云儒者之學不宜單提靜字以類於禪然靜則悔吝少亦收斂雜馳之一端此説得亦斟酌三魚堂賸言卷七
