body:
  text: 三魚堂賸言卷四監察御史贈内閣學士陸隴其撰左傳昭元年子産曰君子有四時朝以聼政晝以訪問夕以修令夜以安身于是乎節宣其氣勿使有所壅閉湫底以露其體䟽解之曰凡人形神有限不可久用神久用則竭形太勞則敝不可以久勞也神不用則鈍形不用則痿不可以久逸也固當勞逸更逓以宣􅄆其氣朝則聼政久則疲疲則易之以訪問訪問久則倦倦則易之以修令修令久則怠怠則易之以安身安身久則滯滯則易之以聼政以後事改前心則亦所以散其氣也此一段可與寛猛相濟之理同㸔而太史公自序所言蘇子曕御試䇿所論皆偏矣又露其體下即接以兹心不爽而昏亂百度䟽云神隨形而盛衰既露其體則神識亦弱申豐論雹孔䟽引鄭康成云國之失政君子知其大者其次知其小者夫深山窮谷固隂冱寒極隂之處冰凍所聚不取其氷則氣蓄不泄結凝而為伏隂雨水而伏隂薄之則凝而為雹詳載申豐之言以著藏氷之禮不可廢其實雹不是盡由氷亦政失所致也吾於此知所謂不賢者識其小者執其一隅之見而未知道之大端然道未始不在此也又于此知古人之燮理隂陽周宻無遺觀毁中軍于施氏成諸臧氏知季氏之巧於卸罪欲名實兼收女叔齊之論儀與北宮文子之論儀淺深不同而各極其妙叔向論鑄刑書孔䟽有二意其前則曰伊訓云先王肇修人紀制官刑穆王作呂刑周禮司刑掌五刑之法皆是豫制刑矣而云臨事制刑不豫設法者聖王雖制刑法舉其大綱但共犯一法情有淺深或輕而難原或重而可恕聼其時事議其輕重雖依凖舊條而斷有出入不豫設定法告示下民令不測其淺深常畏威而懼罪也其後則曰子産鑄刑書而叔向責之趙鞅鑄刑鼎而仲尼譏之如此傳文則刑之輕重不可使民知也而李悝作法蕭何造律頒于天下莫之能革以今觀之不可一日而無律也斯有㫖矣古者分地建國奕世相承知國為吾土衆實吾民不生殘賊之意故得臨事議罪秦漢以來長吏以時遷代其民非復已有若任其縱舍必將喜怒變常愛憎改意不得不作法以齊之此又是一意前説勝愚常云律可定而例不可定前説正是愚意白狄有二有在晉之東者昭十二年註所謂鮮虞白狄别種是也有在晉之西者成十三年所謂白狄及君同州是也孔䟽解三墳五典不偏主一説及解禆竈所論陳災婺女則皆云非吾徒所能測絶不穿鑿最是得體相疑相忌之際為禍最速觀於欒髙陳鮑之事可不懼哉子産處駟乞之事此與邲之戰孫叔敖初則南轅終則曰寜我薄人同一無我昭二十一年魯待范鞅十一牢據䟽因十四年魯人失禮為鮑國七牢遂致范鞅之怒其後哀七年吳遂徴百牢一失禮遂無有底止益歎子産之善事大國叔孫穆子不肯行賂于樂王鮒昭子不肯行賂于范獻子同一正氣晏子論和同䟽云説和羮而不言䜴古人未有豉也䟽亦不言䜴為何物疑即今之醬據䟽謂急就篇乃有鹽䜴秦漢以來始為之昭二十一年梓愼曰二分二至日有食之不為災日月之行也分同道也至相過也註云二分日夜等二至長短極然不言日夜等長短極何以便宜日食孔䟽亦不甚明孔䟽子太叔論禮條下云既言天之經不可復言地之經故變文稱義既言則天之明不可復言則地之性故變文言因因之與則互相通也正是變文使相避耳此可想古人換字之法又太叔云人之能自曲直以赴禮者謂之成人䟽云性曲者以禮直之性直者以禮曲之此意亦最精后夔有子伯封此與堯舜之朱均同昭二十九年孔䟽論重黎烈山只援引經傳絶不武斷最得不知為不知之意定四年楚子渉雎濟江入于雲中奔鄖又奔随䟽云郢都在江北雎東王走西渉雎又南濟江乃入于雲中知此雲在江南昭三年王與鄭伯佃于江南之夢謂此也言江南之夢則江北亦有夢矣相如子虚賦云雲夢者方九百里則此澤跨江南北又云隨義陽隨縣其國在楚之東也鄖江夏雲杜縣則是楚之西南吳師猶尚在楚更東奔隨國者蓋謂楚與随有恩謂可保守故也今按一統志徳安府治唐為安州春秋時為鄖子國鬬辛為鄖公即此則此鄖在楚都東北矣又鄖陽府鄖縣古麇國則又在楚都西北矣又荆州府有鄖城在府城南二百里楚昭王時所築此則在楚都西南矣又似與江夏無干又沔陽州景陵縣則古之江夏雲杜然又在楚都東南而非西南未知孰是孫北海據沈存中説謂楚子入雲是江北之雲恐難信但沈氏定以江北之監利景陵江南之公安石首為雲夢此則近之大抵此澤在江南者迤而西在洞庭之右在江北者迤而東與洞庭遥對矣胡三省通鑑註據漢陽志云雲在江北夢在江南見威烈王三十三年鑑斷定九年晉軍在中牟孔䟽疑此與論語之中牟當在河北而非河南之中牟最是定四年辨豫章在江北而非江南之豫章亦是哀元年傳有田一成有衆一旅杜註云方十里為成五百人為旅孔䟽謂方十里應有九百夫而止五百人者以井衍沃牧隰臯之法推之二牧而當一井蓋其一百夫授上地不易者其四百夫授一易二而當一則為五百夫矣最精細齊國夏衛石曼姑帥師圍戚公羊之説最害義註䟽從榖梁而排公羊最是觀董安于不能免于晉萇𢎞不能免于周春秋之末至於如此可歎哉陳乞偽事髙國一段歎世途有如此嶮巇轅濤塗之譖申侯又不足言矣可畏哉古書之參錯也如一黄池之㑹國語則吳先晉左傳則晉先吳一敬王元王史記周本紀十二諸侯年表則以為敬王崩子元王仁立元王八年崩子定王介立定王元年是魯哀之二十七年世本則以為敬王崩貞王介立貞王崩元王赤立此但可傳疑難武斷也孔䟽言仲尼感麟而作春秋所以感者以聖人之生非其時道無所施與麟相類故為感也杜以獲麟之義惟此而已深譏公羊反袂拭面稱吾道窮之説若謂麟應孔子而至則丘明子思孟軻荀卿皆尊崇孔徳何以不言此説最大雅哀廿七年傳云君子之謀也始中終皆舉之而後入焉註云所謂君子三思此不是始中終皆舉只是一思孔䟽衛在汲郡朝歌文公遷楚丘成公遷帝丘則在東郡濮陽則朝歌已為狄有後又入于晉然䟽未明言三魚堂賸言卷四
