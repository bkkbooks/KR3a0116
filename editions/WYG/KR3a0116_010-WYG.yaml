body:
  text: 三魚堂賸言卷十監察御史贈内閣學士陸隴其撰閱陸桴亭分野圖一行所謂自南正達于西正得雲漢升氣為山河上流自北正達于東正得雲漢降氣為山河下流娵訾在雲漢升降中居水行正位故其分野當中州河濟間東井處百川上流故鶉首為秦蜀墟得兩戒山河之首星紀居河漢下流百川歸焉析木為雲漢末派山河極焉故其分野自南河下流窮南紀之曲東南負海為星紀自北河末泒窮北紀之曲東北負海為析木此等處甚明至謂五月一隂生而雲漢潛萌于天稷之下十一月一陽生而雲漢漸降此不可解雲漢在天本有定位似每日有升降不知何故謂升降因月而異此升降似以隱見言閱桴亭月道圖説始知洪範註所云月立春春分從青道者言月行太陽立春春分之道則謂之青道非謂立春春分之時而月行青道也月行九道十有九歳而一周非一歳而厯九道也一千六百九十八日有竒而行一道非一季而即能遍一道也桴亭此圖大有功於學者查舊所抄圖書編内有云月上弦于東井下弦于牽牛上弦于牽牛下弦于東井又邵子云冬至之月所行如夏至之日夏至之月所行如冬至之日前數語大抵即桴亭所云以交初所臨而言也若邵子數言則却似月一年而厯南北與十九歳而徧九道之説似不同疑月一歳之内雖夏南冬北至于極南極北則必十九歳而一周也月食據欽天監頒行京師月食七分四杪初虧寅正三刻十二分食甚夘正二刻六分復圓辰正初刻是夜初虧月正在申位厯酉至戍而沒乃知邵康節所云冬至之月所行如夏至之日夏至之月所行如冬至之日其言果然蓋以晝夜長短而言非以極南極北而言也到欽天監㑹邵武峯談厯邵言西法不能出古法之範圍而多改頭換面以自異如歳差消長之法西法不能異于古也而將宮次移易則便若大異天周有餘日周不足所以有歳差譬之湍水然在内者勢狹而轉急在外者勢寛而轉稍緩此古法也而西法則分為㡬重天遂若大異惟以地為圓體此為獨得而弧矢算法亦勝于郭守敬愚因問天文家之言曰冬至日在箕斗之黄道此道出辰入申故日亦出辰入申夏至日在井鬼之黄道此道出寅入戍故日亦出寅入戍是日之北而復南南而復北者黄道之勢然也然以歳差推之假使千萬年後冬至日躔退在井鬼則冬至日亦當出寅入戍與武峯曰不然若使冬至日躔退在井鬼則牛鬼之黄道亦改而南矣蓋所謂日躔在井鬼者非必定與井鬼之宿同在一處也但與之相當耳或南或北固隨時不同也故夏至躔井鬼則此道便出寅入戍冬至躔井鬼則此道便出辰入申余為之恍然因思向見傅仁均答王孝通曰日躔宿度如郵傳之過宿度既差黄道隨而變矣余初㸔之殊不解不知黄道如何様變今乃悟所謂變者乃南北之異耳但仁均説得不明白不如武峯之言鑿然又思西法謂列宿與天各有運行以此致歳差其説亦不然㸔來依西法則列宿移而黄道不移依古法則黄道移而列宿不移不知是否當再叩之天原發㣲載蔡季通問極星只在天中東西南北皆取正于極而極星皆在上何也文公無以對此段未知出何處按若依今西法論極星則可無疑矣閱孫北海河紀見昔之論河源者紛紛不一合而言之有三大約言出于闐葱嶺者其下源也言出崑崙者其中源也言出西番朶甘衛西直四川馬湖蠻部正西三千餘里去雲南麗江西北一千五百里俗傳為星宿海者其上源也自星宿海東北流經崑崙山之南折而東流復繞崑崙山之北至積石經河州始入中國張騫見其下源而不見其中源崑崙之説見其中源而不見其下源至元學士蒲察篤始窮厯而得之自星宿至崑崙三千餘里自崑崙至積石又三千餘里自積石至龍門又三千餘里而或以為二萬一千三百餘里者悞也向見言黄河者皆云河舊在汴城北四十里東經虞城下達濟寜洪武二十四年決原武縣黑洋山東經汴城北五里又南至項城入淮而故道遂淤正統十三年又決滎陽過開封城西南而城北之新河又淤自是汴城在河北矣然嘗問從中州來者則今汴城仍在河之南甚疑之今觀河紀載𢎞治時廵撫徐恪疏云𢎞治二年以來漸徙而北又決金龍口諸處直趨張秋而汴南之新河又淤乃知所謂汴城在河北者只是正統以後𢎞治以前之事又按河紀國初糧船自儀真抵淮安謂之裡河俱分入五壩轉盤黄河謂之外河原不相通後平江伯䟽開清江浦由天妃口徑通黄河仍設閘以司啓閉其後恐黄水灌入河臣乃議塞天妃口以杜黄水創開三里新河設通濟閘以通淮水此段説天妃縁由最明然亦未詳新河創自何人潘季馴楊一魁二人相接為總河一主築隄束水一主分黄導淮此議論之最不同者河紀中皆言其有功未曾剖析孰非孰是季馴云人欲棄舊以為新而臣謂故道必不可失人欲分支以殺勢而臣謂濁流必不可分然觀萬厯廿五年總河劉東星䟽云河自商虞而下厯丁家道口馬牧集韓家道口趙家圏石將軍廟兩河口出小浮橋下二洪乃賈魯老黄河故道自元及我朝嘉靖年間行之甚利至三十七年北徙濁河而此河遂淤萬厯七年總河潘季馴議復開之以工費浩繁不果則是潘公四治河束水之䇿雖行而故道之䇿未全用也按潘公第一次治河在嘉靖末只佐朱公衝開新河非其本意第二次治河在隆慶末開所謂故道垂成而廢第三次治河在萬厯六年功成髙堰而故道仍不果行第四次在萬厯十六年惟見嚴閘禁築遥堤諸議不見别作為但其始終不主開泇之議只就河言河是即復故道之意也河紀嘉靖十二年劉天和之治河亦似有見蓋因運河原不用黄河之水故棄魚臺榖亭之淤河不治聼河向趙皮塞南行而專濬漕河此在朱潘楊李之前自成一䇿嘉靖初尚書胡世寜論河勢南分二道東南一道東分新舊五道説得最詳然只是嘉靖初年黄河之勢不應刪其姓名年月混入禹貢註王亮士䟽濬末議一篇專論濱海形勢即導淮九則中海口一條之意而此言之特詳大意言北至廟灣南抵泰州二三百里是即所謂范公堤名塲塲分即于堤上按地分界亦猶自淮及揚髙寳各分界于其中也東為鹽塲竈户居之西為民田惟民種之挨堤内有大河名曰穿塲河沿河各立塲分各有石閘洩水入其運鹽港河以達于海是則各塲皆有海口矣當年范公造堤之義有二一為不開穿塲河則塲分隔絶鹽觔難于轉運一為髙寳興鹽下河一帶直達鹽塲上下瀰漫毫無阻隔上水易洩涓滴不留則民田盡成陸地而海潮泛漲斥滷倒入則苖稼勢必枯焦又慮水壅莫洩故各造石閘以達港而入于海是即所謂運鹽各港河也考前朝祖制自范公堤外皆係草塲惟供燒剪不蒔禾稼是以不厭海潮故范公惟于堤上閘口各立水簾而不問閘下之港與河也今草塲既於前朝變價以充邉餉則在官之草塲盡為各竈之私産開墾耕刈盡屬禾苖雖欲不實為築壩不可得矣倘惟議開復而不議建閘以時啟閉非持平之論也又云地脉由雍而豫而揚至海而盡此舊説也若海中大勢必至黒洋方為大海其色深黒而味苦若其出海千餘里雖則茫然無際實則非可横行之地蓋耕牧之地至通㤗興鹽而盡其未盡者分沙五支直入大海之中凡千餘里所謂五條沙也潮長則洋洋湯湯茫無畔岸潮落則沙壅土漲深不容尺其沙土堅硬更甚鐡石海船可載數千者必逺而避之惟沙船底窄可以掉臂其中其船即因沙以得名故海口之間無與於踈防又云若淮黄㑹而東趨則滙聚于安東對面之馬邏逹義蘓家嘴新溝口栁浦灣五大險工一帶處所入海欲于對岸開一支河以殺河勢又懼有傷安東必築髙堤以固之又戊申上明公書云築歸仁集等隄鳯泗淮揚民請僉同若議築翟家埧一帶決口則盱泗等州縣必為力争謂與彼地不利查萬厯年間潘季馴築塞髙堰決口之後盱泗皆樂豐年載在潘公申辨泗州鄉紳常三省䟽中若非當年赫然震怒將常三省力行黜罷髙堰石工焉能告成而不意彼地奸人利於私販又將石工未及之處復行盜決以致貽害若此也又議用灾民畚鍤云細心分别壯健定為一工派於􅅺水險要地面每日照六分定例日給米四升銀二分婦女及老㓜定為一工派於髙原地面日給米三升銀三分如其人力㣲小則量减銀二分若夫跛癃殘疾難資其力役之用而實可課以綯索踣擊之工亦止給以米二升銀二分所有節省銀米存為犒勞壯徤鼔舞工作之費夫役不必逺調而自集灾民不必賑䘏而共飽又云茍得其人而任之必為假之以用舍之柄濡之以持久之計裕之以錢榖之資與之以便宜之略重之以斬殺之權而斷不可拘牽之以文墨淆亂之以議論限勒之以程期恐動之以詰責始可漸次以期其功倘决一口而必俟部覆以施工用一錢而必俟估計以銷奏㧞一人而必拘資格以註册罪一夫而必待奏奪以施刑欲求平成立奏此必不得之數三魚堂賸言卷十
